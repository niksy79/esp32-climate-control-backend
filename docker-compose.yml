services:

  # ── MQTT broker ─────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # MQTT over WebSockets
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── TimescaleDB (PostgreSQL 16 + time-series extensions) ────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── climate-backend ─────────────────────────────────────────────────────────
  climate-backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8081:8080"
    depends_on:
      mosquitto:
        condition: service_healthy
      timescaledb:
        condition: service_healthy

  # ── React web app ───────────────────────────────────────────────────────────
  climate-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: climate-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - climate-backend

  # ── Cloudflare Tunnel ───────────────────────────────────────────────────────
  # Exposes the backend and/or MQTT WebSocket port to the internet without
  # opening firewall ports.  Uncomment and replace TUNNEL_TOKEN with the token
  # from the Cloudflare Zero Trust dashboard (Networks → Tunnels → Create tunnel).
  #
  # cloudflare-tunnel:
  #   image: cloudflare/cloudflared:latest
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - climate-backend

volumes:
  mosquitto-data:
  mosquitto-logs:
  timescaledb-data:
