# Mosquitto MQTT broker configuration
# Anonymous access enabled for ESP32 devices on the local network.

# ── TCP listener ────────────────────────────────────────────────────────────
listener 1883
protocol mqtt
allow_anonymous true

# ── WebSocket listener (useful for browser-based debugging) ─────────────────
listener 9001
protocol websockets
allow_anonymous true

# ── Persistence ─────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ─────────────────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
